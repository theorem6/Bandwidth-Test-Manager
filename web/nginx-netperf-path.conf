# Bandwidth Test Manager under /netperf/ — include in your server block.
# Vite builds asset URLs as /static/... (FastAPI serves StaticFiles at /static/).
# You must proxy BOTH /netperf/ (HTML + API) and /static/ (JS/CSS/fonts) to the app.

location = /netperf {
    return 301 $scheme://$host/netperf/;
}
location /netperf/ {
    proxy_pass http://127.0.0.1:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /netperf;
}
location /static/ {
    proxy_pass http://127.0.0.1:8080/static/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
