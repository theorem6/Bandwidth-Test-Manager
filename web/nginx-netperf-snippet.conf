# Include inside an existing server { } block that already has SSL.
# Use netperf-proxy.conf for app-at-root; use netperf-path.conf when app is at /netperf/

# App at root (replaces location /):
# include /etc/nginx/snippets/netperf-proxy.conf;

# App under /netperf/ (add before catch-all location /):
# include /etc/nginx/snippets/netperf-path.conf;

location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
